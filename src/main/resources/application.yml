spring:
  application:
    name: managers
  profiles:
    group:
      test: "test"
      local: "local, datasource"
      dev: "dev, datasource, actuator"
    include:
      - redis
      - security
      - aws
      - batch

spring-doc:
  default-consumes-media-type: application/json
  default-produces-media-type: application/json
  swagger-ui:
    tags-sorter: alpha
    operations-sorter: method
    disable-swagger-default-url: true
    path: /swagger-ui
    doc-expansion: none
