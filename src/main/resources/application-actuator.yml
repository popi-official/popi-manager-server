spring:
  config:
    activate:
      on-profile: "actuator"
management:
  endpoints:
    jmx:
      exposure:
        exclude: "*"
    web:
      exposure:
        include: health, prometheus
      base-path: /manager-actuator
    access:
      default: none
  endpoint:
    health:
      access: unrestricted
    prometheus:
      access: unrestricted